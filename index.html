// 打乱数组函数 (Fisher-Yates)
function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// 分别打乱单选题和多选题
const shuffledSingles = shuffleArray([...rawSingle]);
const shuffledMulti = shuffleArray([...rawMulti]);

// 合并：单选题在前，多选题在后，并重新生成 id (1 到 total)
let allQuestions = [];
let idCounter = 1;
shuffledSingles.forEach(item => {
    allQuestions.push({
        id: idCounter++,
        type: "single",
        title: item.title,
        options: item.options,
        answer: item.answer
    });
});
shuffledMulti.forEach(item => {
    allQuestions.push({
        id: idCounter++,
        type: "multi",
        title: item.title,
        options: item.options,
        answer: item.answer
    });
});

const totalQ = allQuestions.length;
let cur = 0;
let errorQuestions = [];
let completedQuestions = new Set();
let studyErrorOnly = false;
let errorQuestionIds = [];

function loadData() {
    const savedCur = localStorage.getItem('xq_question_cur_v3');
    if (savedCur !== null) cur = parseInt(savedCur);
    const savedCompleted = localStorage.getItem('xq_completed_questions_v3');
    if (savedCompleted) completedQuestions = new Set(JSON.parse(savedCompleted));
    const savedErrors = localStorage.getItem('xq_error_questions_v3');
    if (savedErrors) {
        errorQuestions = JSON.parse(savedErrors);
        errorQuestionIds = errorQuestions.map(q => q.id);
    }
    updateProgressInfo();
    document.getElementById('totalCount').innerText = totalQ;
}
function saveProgress() {
    localStorage.setItem('xq_question_cur_v3', cur);
    localStorage.setItem('xq_completed_questions_v3', JSON.stringify([...completedQuestions]));
    localStorage.setItem('xq_error_questions_v3', JSON.stringify(errorQuestions));
}
function updateProgressInfo() {
    document.getElementById('completedCount').innerText = completedQuestions.size;
    document.getElementById('errorCount').innerText = errorQuestions.length;
}
function addToErrorBook(question) {
    if (!errorQuestionIds.includes(question.id)) {
        errorQuestions.push(question);
        errorQuestionIds.push(question.id);
        saveProgress();
        updateProgressInfo();
    }
}
function removeFromErrorBook(questionId) {
    errorQuestions = errorQuestions.filter(q => q.id !== questionId);
    errorQuestionIds = errorQuestions.map(q => q.id);
    saveProgress();
    updateProgressInfo();
}
function openErrorBook() {
    const modal = document.getElementById('errorModal');
    const errorList = document.getElementById('errorList');
    const emptyTip = document.getElementById('emptyErrorTip');
    errorList.innerHTML = '';
    if (errorQuestions.length === 0) {
        emptyTip.style.display = 'block';
    } else {
        emptyTip.style.display = 'none';
        errorQuestions.forEach((q, index) => {
            const errorItem = document.createElement('div');
            errorItem.className = 'error-item';
            let answerText = '';
            if (q.type === 'single') {
                const idx = ['A','B','C','D'].indexOf(q.answer);
                answerText = `正确答案：${q.answer} - ${q.options[idx] || ''}`;
            } else {
                answerText = '正确答案：';
                q.answer.split('').forEach(ans => {
                    const ansIndex = ['A','B','C','D','E','F','G'].indexOf(ans);
                    if (ansIndex >= 0 && q.options[ansIndex]) {
                        answerText += `${ans} - ${q.options[ansIndex]}、`;
                    } else {
                        answerText += `${ans}、`;
                    }
                });
                answerText = answerText.slice(0, -1);
            }
            errorItem.innerHTML = `
                <div class="error-item-title">
                    第${q.id}题：${q.title}
                    <span class="show-answer" onclick="showErrorAnswer(${index})">查看答案</span>
                    <span class="show-answer" style="color:#ef4444" onclick="removeErrorQuestion(${q.id})">移除</span>
                    <span class="show-answer" style="color:#10b981" onclick="gotoErrorQuestion(${q.id})">前往做题</span>
                </div>
                <div class="error-item-options">
                    ${q.options.map((opt, i) => `<div>${String.fromCharCode(65+i)}: ${opt}</div>`).join('')}
                </div>
                <div class="error-item-answer" id="errorAnswer_${index}" style="display:none">${answerText}</div>
            `;
            errorList.appendChild(errorItem);
        });
    }
    modal.style.display = 'flex';
}
function closeErrorBook() { document.getElementById('errorModal').style.display = 'none'; }
function showErrorAnswer(index) {
    const answerEl = document.getElementById(`errorAnswer_${index}`);
    if(answerEl) answerEl.style.display = answerEl.style.display === 'none' ? 'block' : 'none';
}
function removeErrorQuestion(questionId) {
    if (confirm('确定要移除这道错题吗？')) {
        removeFromErrorBook(questionId);
        openErrorBook();
    }
}
function gotoErrorQuestion(questionId) {
    closeErrorBook();
    cur = allQuestions.findIndex(q => q.id === questionId);
    render();
}
function toggleStudyMode() {
    studyErrorOnly = !studyErrorOnly;
    const btn = document.querySelector('.func-btn:not(.error-btn):not(.reset-btn)');
    btn.textContent = studyErrorOnly ? '显示全部题目' : '仅做错题';
    if (studyErrorOnly && errorQuestions.length > 0) {
        cur = allQuestions.findIndex(q => q.id === errorQuestions[0].id);
    }
    render();
    updateNavButtons();
}
function resetProgress() {
    if (confirm('确定要重置所有进度和错题本吗？此操作不可恢复！')) {
        localStorage.removeItem('xq_question_cur_v3');
        localStorage.removeItem('xq_completed_questions_v3');
        localStorage.removeItem('xq_error_questions_v3');
        cur = 0;
        completedQuestions.clear();
        errorQuestions = [];
        errorQuestionIds = [];
        studyErrorOnly = false;
        const btn = document.querySelector('.func-btn:not(.error-btn):not(.reset-btn)');
        btn.textContent = '仅做错题';
        updateProgressInfo();
        render();
    }
}
function updateNavButtons() {
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    if (!studyErrorOnly) {
        prevBtn.disabled = cur === 0;
        nextBtn.disabled = cur === totalQ - 1;
    } else {
        const currentErrorIndex = errorQuestionIds.indexOf(allQuestions[cur].id);
        prevBtn.disabled = currentErrorIndex <= 0;
        nextBtn.disabled = currentErrorIndex >= errorQuestionIds.length - 1;
    }
}
function goPrev() {
    if (!studyErrorOnly) {
        cur--;
    } else {
        const currentErrorIndex = errorQuestionIds.indexOf(allQuestions[cur].id);
        if (currentErrorIndex > 0) {
            cur = allQuestions.findIndex(q => q.id === errorQuestionIds[currentErrorIndex - 1]);
        }
    }
    render();
}
function goNext() {
    if (!studyErrorOnly) {
        cur++;
    } else {
        const currentErrorIndex = errorQuestionIds.indexOf(allQuestions[cur].id);
        if (currentErrorIndex < errorQuestionIds.length - 1) {
            cur = allQuestions.findIndex(q => q.id === errorQuestionIds[currentErrorIndex + 1]);
        }
    }
    render();
}
function render() {
    if (studyErrorOnly && errorQuestions.length > 0 && !errorQuestionIds.includes(allQuestions[cur].id)) {
        cur = allQuestions.findIndex(q => q.id === errorQuestions[0].id);
    }
    const q = allQuestions[cur];
    document.getElementById("current").innerText = cur+1;
    document.getElementById("total").innerText = studyErrorOnly ? errorQuestions.length : totalQ;
    
    let titleHtml = q.title;
    if (q.type === "multi") {
        let answerLetters = q.answer.split('').join('、');
        titleHtml += `<span class="answer-hint">（正确答案：${answerLetters}）</span>`;
    }
    document.getElementById("qTitle").innerHTML = titleHtml;
    document.getElementById("type").innerText = q.type==="multi"?"多选题":"单选题";
    
    const optsDiv = document.getElementById("opts");
    optsDiv.innerHTML = "";
    
    completedQuestions.add(q.id);
    saveProgress();
    updateProgressInfo();

    q.options.forEach((t, i) => {
        const optDiv = document.createElement("div");
        optDiv.className = "opt";
        const letter = String.fromCharCode(65+i);
        optDiv.innerText = `${letter}: ${t}`;
        
        if (errorQuestionIds.includes(q.id)) {
            const mark = document.createElement('span');
            mark.className = 'mark-wrong';
            mark.innerText = '错题';
            optDiv.appendChild(mark);
        }
        
        optDiv.onclick = () => {
            if (q.type === "single") {
                document.querySelectorAll(".opt").forEach(x => x.classList.remove("correct","wrong"));
                const isCorrect = (letter === q.answer);
                optDiv.classList.add(isCorrect ? "correct" : "wrong");
                if (isCorrect) {
                    removeFromErrorBook(q.id);
                } else {
                    addToErrorBook(q);
                }
            } else {
                const isCorrect = q.answer.includes(letter);
                document.querySelectorAll(".opt").forEach(x => x.classList.remove("correct","wrong"));
                optDiv.classList.add(isCorrect ? "correct" : "wrong");
                if (isCorrect) {
                    removeFromErrorBook(q.id);
                } else {
                    addToErrorBook(q);
                }
            }
        };
        optsDiv.appendChild(optDiv);
    });
    
    updateNavButtons();
}
function doSearch(){
    const kw = document.getElementById("searchInput").value.toLowerCase();
    const searchQuestions = studyErrorOnly ? errorQuestions : allQuestions;
    for(let i=0;i<searchQuestions.length;i++){
        if(searchQuestions[i].title.toLowerCase().includes(kw)){
            cur = allQuestions.findIndex(q => q.id === searchQuestions[i].id);
            render();
            return;
        }
    }
    alert("未找到");
}
function clearSearch(){ document.getElementById("searchInput").value = ""; }

document.getElementById("prev").onclick = goPrev;
document.getElementById("next").onclick = goNext;
window.onload = function() { loadData(); render(); };
</script>
